<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout Cancelled — NOISE</title>
<style>
html { overflow-y: scroll; }
body {
    background-color: #000;
    color: #fff;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 40px 24px;
    box-sizing: border-box;
    text-align: center;
}
.icon {
    font-size: 64px;
    margin-bottom: 24px;
}
h1 {
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin: 0 0 16px;
}
p {
    font-size: 15px;
    color: #aaa;
    letter-spacing: 1px;
    line-height: 1.8;
    max-width: 480px;
    margin: 0 0 40px;
}
.btn-row { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
a {
    display: inline-block;
    text-decoration: none;
    padding: 14px 36px;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: opacity 0.2s;
}
a.primary { background-color: #fff; color: #000; }
a.secondary { background-color: transparent; color: #fff; border: 1px solid #444; }
a:hover { opacity: 0.8; }
</style>
</head>
<body>
<div class="icon">✕</div>
<h1>Checkout Cancelled</h1>
<p>No worries — your bag is still saved.<br>Head back whenever you're ready.</p>
<div class="btn-row">
    <a class="primary" href="Shop.html">Back to Shop</a>
    <a class="secondary" href="index.html">Home</a>
</div>
</body>
</html>
