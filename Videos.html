<head>

<style>
/* ── Setup container ── */
.setup-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
    box-sizing: border-box;
    min-height: calc(100vh - 60px);
}

/* ── TV ── */
.tv-body {
    width: 1050px;
    max-width: 94vw;
    background: linear-gradient(160deg, #2e2e2e 0%, #1a1a1a 60%, #242424 100%);
    border-radius: 18px 18px 14px 14px;
    padding: 28px 28px 20px;
    box-shadow:
        0 0 0 3px #333,
        0 0 0 5px #111,
        0 30px 80px rgba(0,0,0,0.9),
        inset 0 1px 0 rgba(255,255,255,0.07),
        inset 0 -2px 0 rgba(0,0,0,0.4);
}

.tv-screen-bezel {
    background: #0c0c0c;
    border-radius: 10px;
    padding: 14px;
    box-shadow:
        inset 0 3px 10px rgba(0,0,0,0.95),
        inset 0 0 2px rgba(255,255,255,0.03);
}

.tv-screen {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #030303;
    border-radius: 6px;
    overflow: hidden;
}

#staticCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
}

.tv-scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.2) 2px,
        rgba(0,0,0,0.2) 4px
    );
    pointer-events: none;
    z-index: 2;
}

.tv-vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 52%, rgba(0,0,0,0.8) 100%);
    pointer-events: none;
    z-index: 3;
}

.tv-glitch-bar {
    position: absolute;
    left: 0; right: 0;
    height: 0;
    background: rgba(160,210,255,0.1);
    pointer-events: none;
    z-index: 4;
    opacity: 0;
    transition: opacity 0.05s;
}

.tv-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    padding: 0 4px;
}

.tv-brand {
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 5px;
    color: #3a3a3a;
    text-transform: uppercase;
}

.tv-power-light {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #c00;
    box-shadow: 0 0 6px #f00, 0 0 14px rgba(255,0,0,0.35);
}

/* CSS glitch shake */
@keyframes glitch-shake {
    0%   { transform: translate(0, 0);     filter: none; }
    20%  { transform: translate(-4px, 0);  filter: hue-rotate(80deg) saturate(4); }
    40%  { transform: translate(4px, 1px); filter: hue-rotate(160deg) brightness(1.5); }
    60%  { transform: translate(-2px, 0);  filter: brightness(0.5); }
    80%  { transform: translate(3px, -1px);filter: hue-rotate(240deg); }
    100% { transform: translate(0, 0);     filter: none; }
}

.tv-screen.glitching {
    animation: glitch-shake 0.12s steps(2) forwards;
}

/* ── VHS Player ── */
.vhs-body {
    width: 1050px;
    max-width: 94vw;
    margin-top: 20px;
    height: 110px;
    background: linear-gradient(180deg, #242424 0%, #171717 55%, #1e1e1e 100%);
    border-radius: 6px;
    display: flex;
    align-items: center;
    padding: 0 28px;
    box-sizing: border-box;
    box-shadow:
        0 0 0 2px #2e2e2e,
        0 0 0 3px #111,
        0 12px 36px rgba(0,0,0,0.85),
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 -1px 0 rgba(0,0,0,0.5);
    gap: 0;
}

.vhs-left {
    flex: 1;
    display: flex;
    align-items: center;
}

.vhs-display {
    background: #070d07;
    color: #3d9e3d;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    padding: 6px 14px;
    border-radius: 3px;
    box-shadow:
        inset 0 2px 6px rgba(0,0,0,0.9),
        0 0 10px rgba(50,140,50,0.12);
    text-align: center;
}

.vhs-center {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.vhs-slot {
    width: 320px;
    height: 68px;
    background: linear-gradient(180deg, #050505 0%, #0d0d0d 100%);
    border-radius: 4px;
    box-shadow:
        inset 0 4px 12px rgba(0,0,0,0.98),
        inset 0 1px 2px rgba(0,0,0,0.9),
        0 1px 0 rgba(255,255,255,0.04);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.vhs-tape-label {
    width: 88%;
    height: 62%;
    border-radius: 2px;
    background: #111;
    box-shadow: inset 0 1px 4px rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.vhs-tape-label-text {
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #444;
    text-align: center;
    padding: 0 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.vhs-right {
    flex: 1;
    display: flex;
    justify-content: flex-end;
    align-items: center;
}

.vhs-vents {
    display: flex;
    gap: 5px;
}

.vhs-vents span {
    display: block;
    width: 2px;
    height: 26px;
    background: #111;
    border-radius: 1px;
    box-shadow: 1px 0 0 rgba(255,255,255,0.03);
}

/* ── Responsive ── */
@media (max-width: 768px) {
    .setup-container {
        padding: 20px 10px 60px;
        min-height: auto;
    }
    .tv-body {
        padding: 16px 16px 14px;
    }
    .tv-screen {
        aspect-ratio: 4 / 3;
    }
    .vhs-body {
        height: 90px;
        padding: 0 16px;
    }
    .vhs-slot {
        width: 180px;
        height: 52px;
    }
    .vhs-display {
        font-size: 11px;
        padding: 5px 10px;
        letter-spacing: 2px;
    }
}
</style>

<script>
(function () {
    var canvas    = document.getElementById('staticCanvas');
    var ctx       = canvas.getContext('2d');
    var screen    = document.getElementById('tvScreen');
    var glitchBar = document.getElementById('glitchBar');
    var isGlitching = false;

    function resizeCanvas() {
        canvas.width  = screen.offsetWidth;
        canvas.height = screen.offsetHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function drawStatic() {
        var w = canvas.width;
        var h = canvas.height;
        if (!w || !h) { requestAnimationFrame(drawStatic); return; }

        var imageData = ctx.createImageData(w, h);
        var data = imageData.data;

        for (var i = 0; i < data.length; i += 4) {
            var v = (Math.random() * 255) | 0;
            data[i]   = v * 0.82;
            data[i+1] = v * 0.93;
            data[i+2] = v;
            data[i+3] = 255;
        }

        if (isGlitching) {
            var bandY = (Math.random() * h) | 0;
            var bandH = ((Math.random() * 24) + 4) | 0;
            var shift = (((Math.random() - 0.5) * 50)) | 0;
            for (var y = bandY; y < Math.min(bandY + bandH, h); y++) {
                for (var x = 0; x < w; x++) {
                    var srcX = Math.min(w - 1, Math.max(0, x + shift));
                    var dst  = (y * w + x) * 4;
                    var src  = (y * w + srcX) * 4;
                    data[dst]   = data[src];
                    data[dst+1] = data[src+1];
                    data[dst+2] = data[src+2];
                }
            }
        }

        ctx.putImageData(imageData, 0, 0);
        requestAnimationFrame(drawStatic);
    }
    drawStatic();

    function triggerGlitch() {
        isGlitching = true;
        screen.classList.add('glitching');

        glitchBar.style.top     = (Math.random() * 80) + '%';
        glitchBar.style.height  = ((Math.random() * 14) + 3) + 'px';
        glitchBar.style.opacity = '1';
        glitchBar.style.transform = 'translateX(' + (((Math.random() - 0.5) * 24) | 0) + 'px)';

        var duration = 80 + (Math.random() * 220);
        setTimeout(function () {
            isGlitching = false;
            screen.classList.remove('glitching');
            glitchBar.style.opacity = '0';
        }, duration);

        setTimeout(triggerGlitch, 1500 + Math.random() * 5000);
    }
    setTimeout(triggerGlitch, 600 + Math.random() * 1500);
}());
</script>
