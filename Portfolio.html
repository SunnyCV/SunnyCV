<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfolio</title>
<style>
html {overflow-y: scroll;}
body {background-color: black; overflow: hidden; padding-bottom: 55px;}
nav ul {list-style-type: none; margin: 0; padding: 0; overflow: hidden;}
nav li {float: right;}
nav img {position: absolute; float: left; margin: -50%, -50%; overflow: hidden; width: 225px;}
li a {display: block; padding: 9px; background-color: rgb(from color r g b);
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    font-weight: 600; text-decoration: none; color: white;}
li a:hover:not(.active) {background-color: #111;}
.active {opacity: 75%;}

/* ── Mobile nav panel ── */
.mobile-nav-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1050;
}
.mobile-nav-overlay.open { display: block; }
.mobile-nav-menu {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 230px;
    height: 100%;
    background-color: #000;
    z-index: 1080;
    padding: 64px 0 20px;
    flex-direction: column;
    border-right: 1px solid #222;
}
.mobile-nav-menu.open { display: flex; }
.mobile-nav-menu a {
    color: white;
    text-decoration: none;
    padding: 16px 28px;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    border-bottom: 1px solid #222;
    display: block;
}
.mobile-nav-menu a:hover, .mobile-nav-menu a.active { background-color: #111; }

/* ── Mobile header bar ── */
.mobile-header {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 48px;
    background-color: #000;
    border-bottom: 1px solid #222;
    z-index: 1090;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px;
    box-sizing: border-box;
}
.mobile-header-hamburger {
    background: none; border: none;
    font-size: 26px; cursor: pointer;
    padding: 4px 8px; color: #fff;
    font-family: Arial, sans-serif; line-height: 1;
}
.mobile-header-logo {
    position: absolute; left: 50%; transform: translateX(-50%);
    height: 34px; width: auto;
}
.mobile-header-spacer {
    width: 46px;
}

@media (max-width: 768px) {
    nav { display: none; }
    .mobile-header { display: flex; }
    body { overflow-y: auto; padding-top: 48px; }
}
@keyframes audioMarquee {
    0%   { transform: translateX(0%); }
    100% { transform: translateX(-100%); }
}
</style>
</head>
<body>

<!-- Background video -->
<video autoplay muted loop playsinline
    style="position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;transform:translateZ(0);will-change:transform;">
    <source src="Noise.mp4" type="video/mp4">
</video>

<!-- Mobile Header Bar -->
<div class="mobile-header" id="mobileHeader">
    <button class="mobile-header-hamburger" id="mobileHamburger" aria-label="Menu">&#9776;</button>
    <a href="Portfolio.html" style="display:contents;"><img class="mobile-header-logo" src="png-logo-inv.png" alt="Portfolio"></a>
    <div class="mobile-header-spacer"></div>
</div>

<!-- Mobile Nav -->
<div class="mobile-nav-overlay" id="mobileNavOverlay"></div>
<div class="mobile-nav-menu" id="mobileNavMenu">
    <a href="Videos.html">VIDEOS</a>
    <a href="Designs.html">DESIGNS</a>
    <a href="Photos.html">PHOTOS</a>
    <a href="About.html">ABOUT</a>
</div>

<nav>
<a href="Portfolio.html" style="display:contents;"><img src="png-logo-inv.png" alt=""></a>
    <ul>
        <li><a href="Videos.html">Videos</a></li>
        <li><a href="Designs.html">Designs</a></li>
        <li><a href="Photos.html">Photos</a></li>
        <li><a href="About.html">About</a></li>
    </ul>
</nav>

<!-- Audio Player -->
<audio id="bgAudio" loop>
    <source src="music/Germs%20-%20GI.mp3" type="audio/mpeg">
</audio>
<div style="position: fixed; bottom: 16px; left: 16px; z-index: 999;
    display: flex; align-items: center; gap: 8px;">
    <button id="audioPlayBtn"
        style="flex-shrink: 0; width: 46px; height: 46px; border-radius: 50%;
        background: #000; border: 1px solid #444; color: white; font-size: 20px;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.5); transition: background 0.2s;
        padding: 0; line-height: 1;">&#9654;</button>
    <div style="overflow: hidden; width: 150px; background: rgba(0,0,0,0.72);
        border-radius: 20px; padding: 5px 12px; box-sizing: border-box;">
        <div style="white-space: nowrap; display: inline-block;
            animation: audioMarquee 12s linear infinite;">
            <span style="color: #ccc; font-family: 'Franklin Gothic Medium',
            'Arial Narrow', Arial, sans-serif; font-size: 11px; letter-spacing: 1.5px;
            text-transform: uppercase;">&#9834;&nbsp; Germs &mdash; GI
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
        </div>
    </div>
</div>

<!-- Instagram link -->
<a href="https://www.instagram.com/withlovefrom.moi/" target="_blank" rel="noopener"
    style="position: fixed; bottom: 16px; right: 16px; z-index: 999;
    width: 46px; height: 46px; border-radius: 50%;
    background: #000; border: 1px solid #444;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5); transition: background 0.2s;
    text-decoration: none;"
    onmouseover="this.style.background='#222'" onmouseout="this.style.background='#000'">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.5" fill="white" stroke="none"/>
    </svg>
</a>

<script>
(function () {
    const btn   = document.getElementById('audioPlayBtn');
    const audio = document.getElementById('bgAudio');
    btn.addEventListener('click', function () {
        if (audio.paused) { audio.play(); btn.textContent = '⏸'; }
        else { audio.pause(); btn.textContent = '▶'; }
    });
    btn.addEventListener('mouseenter', function () { btn.style.background = '#222'; });
    btn.addEventListener('mouseleave', function () { btn.style.background = '#000'; });
}());
</script>
<script>
(function(){
    var btn     = document.getElementById('mobileHamburger');
    var menu    = document.getElementById('mobileNavMenu');
    var overlay = document.getElementById('mobileNavOverlay');
    function toggleNav() { menu.classList.toggle('open'); overlay.classList.toggle('open'); }
    btn.addEventListener('click', toggleNav);
    overlay.addEventListener('click', toggleNav);
})();
</script>
</body>
</html>
