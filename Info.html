<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<link rel="stylesheet" type="text/css" href="PortfolioGallery.css">
<title>Info — Portfolio</title>
<style>

html, body {
    margin: 0; padding: 0;
}

body {
    background: linear-gradient(180deg, #ece8df 0%, #ddd8cc 100%) !important;
    overflow: hidden;
    min-height: 100vh;
}

nav { position: relative; }
nav img { left: 14px; top: 50%; transform: translateY(-50%); height: 30px; width: auto; }
nav li a { color: #333 !important; }
li a:hover:not(.active) { background-color: rgba(0,0,0,0.07) !important; }

.mobile-header { background-color: #e4e0d8 !important; border-bottom: 1px solid #ccc !important; }
.mobile-header-hamburger { color: #444 !important; }
.mobile-nav-menu { background-color: #eae6de !important; border-right: 1px solid #ccc !important; }
.mobile-nav-menu a { color: #333 !important; border-bottom: 1px solid #ccc !important; }

</style>
</head>
<body>

<!-- Mobile Header -->
<div class="mobile-header" id="mobileHeader">
    <button class="mobile-header-hamburger" id="mobileHamburger" aria-label="Menu">&#9776;</button>
    <a href="Portfolio.html" style="display:contents;"><img class="mobile-header-logo" src="insert here" alt="Portfolio"></a>
    <div class="mobile-header-spacer"></div>
</div>

<!-- Mobile Nav -->
<div class="mobile-nav-overlay" id="mobileNavOverlay"></div>
<div class="mobile-nav-menu" id="mobileNavMenu">
    <a href="Portfolio.html">HOME</a>
    <a href="Videos.html">VIDEOS</a>
    <a href="Designs.html">DESIGNS</a>
    <a href="Photos.html">PHOTOS</a>
    <a class="active" href="Info.html">INFO</a>
</div>

<nav>
<a href="Portfolio.html" style="display:contents;"><img src="insert here" alt="Portfolio Logo"></a>
<ul>
    <li><a href="Videos.html">Videos</a></li>
    <li><a href="Designs.html">Designs</a></li>
    <li><a href="Photos.html">Photos</a></li>
    <li><a class="active" href="Info.html">Info</a></li>
    <li><a href="Portfolio.html">Home</a></li>
</ul>
</nav>

<!-- Page content goes here -->

<script src="PortfolioGallery.js"></script>
<script>
/* ── Mobile nav toggle ── */
var mobileHamburger   = document.getElementById('mobileHamburger');
var mobileNavOverlay  = document.getElementById('mobileNavOverlay');
var mobileNavMenu     = document.getElementById('mobileNavMenu');

function openMobileNav() {
    mobileNavMenu.classList.add('open');
    mobileNavOverlay.classList.add('open');
}
function closeMobileNav() {
    mobileNavMenu.classList.remove('open');
    mobileNavOverlay.classList.remove('open');
}
if (mobileHamburger)  mobileHamburger.addEventListener('click', openMobileNav);
if (mobileNavOverlay) mobileNavOverlay.addEventListener('click', closeMobileNav);
</script>
</body>
</html>
