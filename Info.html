<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Info — Portfolio</title>
<style>
html {overflow-y: scroll;}
div {background-color: black;}
body {background-color: #000000; overflow: hidden; padding-bottom: 0;}
h1 {text-align: center; font-size: 84px; font-weight: 900; color: white;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;}
nav ul {list-style-type: none; margin: 0; padding: 0; overflow: hidden;}
nav li {float: right;}
nav img {position: absolute; float: left; margin: -50%, -50%; overflow: hidden; width: 225px;}
li a {display: block; padding: 9px; background-color: rgb(from color r g b);
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    font-weight: 600; text-decoration: none; color: white;}
li a:hover:not(.active) {background-color: #373737;}
.active {opacity: 75%;}
.header {text-align: center; font-size: 36px; font-weight: 900; color: white;
    font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;}
h1.header::first-line {text-align: center; font-size: 96px; font-weight: 900;
    color: white; font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;}

/* ── Mobile / Hamburger ── */
.hamburger-btn {
    display: none;
    background: none;
    border: none;
    color: white;
    font-size: 30px;
    cursor: pointer;
    position: fixed;
    top: 6px;
    left: 10px;
    z-index: 1100;
    padding: 2px 8px;
    line-height: 1;
    font-family: Arial, sans-serif;
}
.mobile-nav-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1050;
}
.mobile-nav-overlay.open { display: block; }
.mobile-nav-menu {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 230px;
    height: 100%;
    background-color: #000;
    z-index: 1080;
    padding: 64px 0 20px;
    flex-direction: column;
    border-right: 1px solid #222;
}
.mobile-nav-menu.open { display: flex; }
.mobile-nav-menu a {
    color: white;
    text-decoration: none;
    padding: 16px 28px;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    border-bottom: 1px solid #222;
    display: block;
}
.mobile-nav-menu a:hover, .mobile-nav-menu a.active { background-color: #111; }

/* ── Mobile header bar ── */
.mobile-header {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 48px;
    background-color: #000;
    border-bottom: 1px solid #222;
    z-index: 1090;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px;
    box-sizing: border-box;
}
.mobile-header-hamburger {
    background: none; border: none;
    font-size: 26px; cursor: pointer;
    padding: 4px 8px; color: #fff;
    font-family: Arial, sans-serif; line-height: 1;
}
.mobile-header-logo {
    position: absolute; left: 50%; transform: translateX(-50%);
    height: 34px; width: auto;
}
.mobile-header-spacer { width: 46px; }

@media (max-width: 768px) {
    .mobile-header { display: flex; }
    nav { display: none; }
    nav img { height: 34px; width: auto; position: absolute; left: 50%; transform: translateX(-50%); top: 7px; }
    body { overflow-y: auto; padding-top: 48px; }
    h1.header { font-size: 52px; }
}
</style>
</head>
<body>

<!-- Mobile Header Bar -->
<div class="mobile-header" id="mobileHeader">
    <button class="mobile-header-hamburger" id="mobileHamburger" aria-label="Menu">&#9776;</button>
    <a href="Portfolio.html" style="display:contents;"><img class="mobile-header-logo" src="png-logo-inv.png" alt="Portfolio"></a>
    <div class="mobile-header-spacer"></div>
</div>

<!-- Mobile Nav -->
<div class="mobile-nav-overlay" id="mobileNavOverlay"></div>
<div class="mobile-nav-menu" id="mobileNavMenu">
    <a href="Videos.html">VIDEOS</a>
    <a href="Designs.html">DESIGNS</a>
    <a href="Photos.html">PHOTOS</a>
    <a class="active" href="Info.html">INFO</a>
</div>

<nav>
<a href="Portfolio.html" style="display:contents;"><img src="png-logo-inv.png" alt=""></a>
    <ul>
        <li><a href="Videos.html">Videos</a></li>
        <li><a href="Designs.html">Designs</a></li>
        <li><a href="Photos.html">Photos</a></li>
        <li><a class="active" href="Info.html">Info</a></li>
    </ul>
</nav>

<div><br></div>

<div style="background-color: white; height: 21px; width: 100%;"></div>

<h1 class="header">About Me</h1>

<div style="background-color: white; height: 21px; width: 100%;"></div>



<script>
(function () {
    var btn     = document.getElementById('mobileHamburger');
    var menu    = document.getElementById('mobileNavMenu');
    var overlay = document.getElementById('mobileNavOverlay');
    function toggleNav() { menu.classList.toggle('open'); overlay.classList.toggle('open'); }
    btn.addEventListener('click', toggleNav);
    overlay.addEventListener('click', toggleNav);
}());
</script>
</body>
</html>
